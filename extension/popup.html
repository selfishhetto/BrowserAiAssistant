<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotkey</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Unbounded:wght@400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #17171a;
      --border: #2a2a30;
      --accent: #00e5a0;
      --accent-dim: rgba(0, 229, 160, 0.12);
      --text: #e8e8f0;
      --muted: #6b6b7a;
    }

    body {
      width: 260px;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      padding: 0;
      overflow: hidden;
    }

    .header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
    }

    .logo {
      width: 26px;
      height: 26px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-family: 'Unbounded', sans-serif;
      font-size: 10px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.05em;
    }

    .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }

    .field { display: flex; flex-direction: column; gap: 5px; }

    label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    input, select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    input:focus, select:focus { border-color: var(--accent); }
    select { cursor: pointer; }

    .toggle-group { display: flex; gap: 6px; }

    .toggle-btn {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      padding: 7px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .toggle-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    .toggle-btn:hover:not(.active) { border-color: var(--text); color: var(--text); }

    .btn {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 6px;
      padding: 9px 14px;
      font-family: 'Unbounded', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      width: 100%;
    }

    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.98); }

    .saved-toast {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--accent);
      color: #000;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      opacity: 0;
      transition: all 0.2s;
      pointer-events: none;
    }

    .saved-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">⚡</div>
    <div class="header-text">
      <h1>HOTKEY</h1>
    </div>
  </div>

  <div class="body">
    <div class="field">
      <label>Модель</label>
      <select id="modelSelect">
        <option value="gemma-4-31b-it">gemma-4-31b-it</option>
        <option value="gemma-4-26b-a4b-it">gemma-4-26b-a4b-it</option>
      </select>
    </div>

    <div class="field">
      <label>Позиция</label>
      <div class="toggle-group">
        <button class="toggle-btn" id="posLeft">←</button>
        <button class="toggle-btn" id="posRight">→</button>
      </div>
    </div>

    <div class="field">
      <label>Длительность (сек)</label>
      <input type="number" id="duration" min="0.5" max="30" step="0.5" value="1.5" />
    </div>

    <button class="btn" id="saveBtn">СОХРАНИТЬ</button>
  </div>

  <div class="saved-toast" id="toast">Сохранено ✓</div>

  <script src="popup.js"></script>
</body>
</html>
